services:
  - type: web
    name: lumina-api
    env: node
    plan: free
    region: oregon # Choose your preferred region
    buildCommand: npm install && npm run db:generate && npm run build:api
    startCommand: npm run start --workspace=@lumina/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this in Render dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: lumina-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  - type: redis
    name: lumina-redis
    plan: free
    ipAllowList: []
